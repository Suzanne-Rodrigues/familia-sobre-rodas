<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Família Sobre Rodas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:#111;
}

.wrap{max-width:1200px;margin:auto;padding:15px;}

.hero{
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffb347);
color:#fff;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
border-radius:12px;
margin-top:5px;
}

button{
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
}

.btn-green{background:#22c55e;color:#fff;}
.btn-blue{background:#3b82f6;color:#fff;}
.btn-yellow{background:#f59e0b;color:#fff;}
.btn-red{background:#ef4444;color:#fff;}

.session{
padding:15px;
border-radius:20px;
color:#fff;
}

.green{background:#22c55e;}
.yellow{background:#f59e0b;}
.red{background:#ef4444;}

.flash{animation:flash 0.7s infinite;}

@keyframes flash{
0%,100%{opacity:1;}
50%{opacity:0.5;}
}

.timer{font-size:30px;font-weight:bold;}

.qr{background:#fff;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore,collection,addDoc,onSnapshot,updateDoc,doc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIza...",
authDomain:"familia-sobre-rodas.firebaseapp.com",
projectId:"familia-sobre-rodas"
});

const db=getFirestore(app);

let sessions=[];

function format(t){
let m=Math.floor(t/60);
let s=t%60;
return m+":"+String(s).padStart(2,"0");
}

function sorted(){
return sessions.sort((a,b)=>{
if(a.requestMore!==b.requestMore){
return a.requestMore?-1:1;
}
return a.endAt-b.endAt;
});
}

function render(){

let html=`
<div class="wrap">
<div class="hero">
<h1>🚗 Família Sobre Rodas</h1>
</div>

<div class="card">
<input id="nome" placeholder="Nome"/>
<select id="tempo">
<option value="5">5</option>
<option value="10">10</option>
</select>
<button class="btn-green" onclick="start()">Iniciar</button>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;">
`;

sorted().forEach(s=>{

let left=Math.floor((s.endAt-Date.now())/1000);
let cor=left<=0?"red":left<=60?"yellow":"green";

html+=`
<div class="session ${cor} ${left<=60?"flash":""}">
<div>${s.nome}</div>
<div class="timer">${format(left)}</div>

<div id="qr${s.id}" class="qr"></div>

<button onclick="mais('${s.id}')">+5</button>
<button onclick="aprovar('${s.id}')">Liberar</button>
</div>
`;
});

html+=`</div></div>`;

document.getElementById("app").innerHTML=html;

sessions.forEach(s=>{
new QRCode(document.getElementById("qr"+s.id), location.href+"?cliente="+s.id);
});
}

window.start=async()=>{
let nome=document.getElementById("nome").value;
let tempo=parseInt(document.getElementById("tempo").value);

await addDoc(collection(db,"sessions"),{
nome,
endAt:Date.now()+tempo*60000,
requestMore:false
});
};

window.mais=async(id)=>{
await updateDoc(doc(db,"sessions",id),{requestMore:true});
};

window.aprovar=async(id)=>{
await updateDoc(doc(db,"sessions",id),{
endAt:Date.now()+5*60000,
requestMore:false
});
};

onSnapshot(collection(db,"sessions"),snap=>{
sessions=snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});

setInterval(render,1000);
</script>
</body>
</html>
