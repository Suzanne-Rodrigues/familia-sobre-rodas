<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Família Sobre Rodas</title>
  <style>
    :root{
      --bg1:#ff8fb1;
      --bg2:#6b7cff;
      --bg3:#8fd3ff;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbeafe;
      --blue:#3366ff;
      --green:#22c55e;
      --orange:#f59e0b;
      --red:#ef4444;
      --purple:#8b5cf6;
      --pink:#ec4899;
      --shadow:0 16px 30px rgba(0,0,0,.16);
      --radius:28px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:18px;
    }

    .hero{
      background:linear-gradient(135deg,#ff9db7,#ff8c7e,#7b7cff);
      color:#fff;
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    .heroTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand h1{
      margin:0;
      font-size:40px;
      line-height:1.05;
    }

    .brand p{
      margin:8px 0 0;
      font-size:18px;
      opacity:.96;
    }

    .tabs{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .tabBtn{
      border:none;
      border-radius:999px;
      padding:13px 18px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      background:rgba(255,255,255,.16);
      color:#fff;
      transition:.18s ease;
    }

    .tabBtn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .tabBtn.active{
      background:#fff;
      color:#111827;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
      border:4px solid rgba(255,255,255,.35);
    }

    .card h2{
      margin:0 0 8px;
      font-size:25px;
    }

    .sub{
      margin:0 0 10px;
      color:var(--muted);
    }

    .hidden{display:none}

    .grid{
      display:grid;
      gap:18px;
    }

    .grid2{
      grid-template-columns:1.05fr .95fr;
    }

    .statsGrid{
      display:grid;
      gap:16px;
      grid-template-columns:repeat(4,minmax(0,1fr));
    }

    .statCard{
      border-radius:24px;
      padding:18px;
      color:#fff;
      box-shadow:var(--shadow);
    }

    .statBlue{background:linear-gradient(135deg,#2563eb,#3b82f6)}
    .statPink{background:linear-gradient(135deg,#db2777,#ec4899)}
    .statGreen{background:linear-gradient(135deg,#16a34a,#22c55e)}
    .statPurple{background:linear-gradient(135deg,#7c3aed,#a78bfa)}

    .statLabel{
      font-size:14px;
      opacity:.94;
    }

    .statValue{
      margin-top:8px;
      font-size:34px;
      font-weight:bold;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:bold;
      color:#374151;
    }

    input, select{
      width:100%;
      padding:15px 16px;
      border-radius:18px;
      border:3px solid var(--line);
      font-size:16px;
      outline:none;
      background:#f8fbff;
      color:#111827;
    }

    input:focus, select:focus{
      border-color:#60a5fa;
      background:#fff;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .row > *{
      flex:1;
      min-width:140px;
    }

    button, .linkBtn{
      border:none;
      border-radius:18px;
      padding:13px 16px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      text-align:center;
      transition:.18s ease;
    }

    button:hover, .linkBtn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .btn-blue{background:var(--blue); color:#fff}
    .btn-green{background:var(--green); color:#fff}
    .btn-yellow{background:var(--orange); color:#fff}
    .btn-red{background:var(--red); color:#fff}
    .btn-purple{background:var(--purple); color:#fff}
    .btn-pink{background:var(--pink); color:#fff}
    .btn-dark{background:#111827; color:#fff}
    .btn-white{background:#fff; color:#111827}

    .sectionActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .empty{
      color:var(--muted);
      padding:10px 0;
    }

    .loginWrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .loginCard{
      width:min(520px,100%);
      background:#fff;
      border-radius:34px;
      padding:26px;
      box-shadow:var(--shadow);
      border:6px solid rgba(255,255,255,.4);
    }

    .loginTitle{
      font-size:34px;
      font-weight:bold;
      color:#111827;
      margin:0;
      text-align:center;
    }

    .loginSub{
      text-align:center;
      color:#6b7280;
      margin:8px 0 18px;
    }

    .loginHelp{
      margin-top:14px;
      background:#f8fafc;
      border:2px solid #dbeafe;
      border-radius:20px;
      padding:14px;
      color:#374151;
      font-size:14px;
    }

    .loginError{
      margin-top:12px;
      padding:12px 14px;
      border-radius:16px;
      background:#fee2e2;
      color:#991b1b;
      font-weight:bold;
    }

    .clientWrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(135deg,#fef3c7,#dbeafe,#fce7f3);
    }

    .clientCard{
      width:min(900px,100%);
      background:#fff;
      border-radius:34px;
      padding:24px;
      box-shadow:var(--shadow);
      border:6px solid rgba(255,255,255,.5);
      text-align:center;
    }

    .clientTitle{
      font-size:20px;
      color:#6b7280;
    }

    .clientName{
      font-size:46px;
      font-weight:bold;
      color:#111827;
      margin-top:8px;
    }

    .clientVehicle{
      font-size:26px;
      margin-top:8px;
      color:#374151;
      font-weight:bold;
    }

    .clientTimer{
      font-size:100px;
      font-weight:bold;
      line-height:1;
      margin:24px 0 16px;
      color:#111827;
    }

    .clientAlert{
      margin-top:12px;
      border-radius:22px;
      padding:18px;
      font-size:30px;
      font-weight:bold;
      box-shadow:0 10px 20px rgba(0,0,0,.14);
      background:#fff200;
      color:#111827;
    }

    .clientPrices{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(3,minmax(0,1fr));
      margin-top:18px;
    }

    .clientPriceBox{
      background:#f8fafc;
      border:2px solid #dbeafe;
      border-radius:18px;
      padding:14px;
    }

    .clientPriceBox .l{
      font-size:13px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .clientPriceBox .v{
      font-size:28px;
      font-weight:bold;
      color:#1d4ed8;
    }

    .clientButtons{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    @media (max-width:1100px){
      .grid2{grid-template-columns:1fr}
      .statsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width:760px){
      .statsGrid,
      .clientPrices{
        grid-template-columns:1fr;
      }
      .brand h1{font-size:30px}
      .clientName{font-size:34px}
      .clientTimer{font-size:68px}
      .clientAlert{font-size:24px}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5Urxcz07j4Q5Adn-l2CMthjjeydXYuQ",
      authDomain: "familia-sobre-rodas.firebaseapp.com",
      projectId: "familia-sobre-rodas",
      storageBucket: "familia-sobre-rodas.firebasestorage.app",
      messagingSenderId: "36117571121",
      appId: "1:36117571121:web:a3104270db6ce852561710",
      measurementId: "G-R5B8BJ829H"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const LOGIN_USER = "admin";
    const LOGIN_PASS = "148369";

    let vehicles = [];
    let plans = [];
    let sessions = [];
    let currentTab = "novo";
    let currentView = "admin";
    let timerInterval = null;

    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function money(v){
      return Number(v || 0).toLocaleString("pt-BR",{ style:"currency", currency:"BRL" });
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function formatTime(sec){
      const s = Math.max(0, Math.floor(sec));
      const min = Math.floor(s / 60);
      const seg = s % 60;
      return `${min}:${String(seg).padStart(2,"0")}`;
    }

    function getSecondsLeft(item){
      return Math.floor((item.endAt - Date.now()) / 1000);
    }

    function getTotalValue(item){
      return Number(item.baseValue || 0) + Number(item.extrasValue || 0);
    }

    function isLoggedIn(){
      return localStorage.getItem("fsr_logged_in") === "true";
    }

    function login(user, pass){
      if(user === LOGIN_USER && pass === LOGIN_PASS){
        localStorage.setItem("fsr_logged_in", "true");
        return true;
      }
      return false;
    }

    function logout(){
      localStorage.removeItem("fsr_logged_in");
      renderApp();
    }

    function setTab(tab){
      currentTab = tab;
      renderAdmin();
    }

    function renderTabs(){
      return `
        <div class="tabs">
          <button class="tabBtn ${currentTab === "novo" ? "active" : ""}" data-tab="novo">🎉 Atendimentos</button>
          <button class="tabBtn ${currentTab === "andamento" ? "active" : ""}" data-tab="andamento">⏱️ Em andamento</button>
          <button class="tabBtn ${currentTab === "veiculos" ? "active" : ""}" data-tab="veiculos">🚘 Veículos</button>
          <button class="tabBtn ${currentTab === "planos" ? "active" : ""}" data-tab="planos">💰 Planos / Preços</button>
          <button class="tabBtn ${currentTab === "relatorio" ? "active" : ""}" data-tab="relatorio">📊 Relatório</button>
        </div>
      `;
    }

    function renderLogin(error = ""){
      currentView = "login";
      const appEl = document.getElementById("app");
      appEl.innerHTML = `
        <div class="loginWrap">
          <div class="loginCard">
            <h1 class="loginTitle">🔐 Painel da Equipe</h1>
            <p class="loginSub">Entre com usuário e senha para acessar o painel.</p>

            <label>Usuário</label>
            <input id="loginUser" placeholder="Digite o usuário" />

            <label>Senha</label>
            <input id="loginPass" type="password" placeholder="Digite a senha" />

            <div class="sectionActions">
              <button class="btn-blue" id="btnLogin">Entrar no painel</button>
            </div>

            ${error ? `<div class="loginError">${escapeHtml(error)}</div>` : ""}

            <div class="loginHelp">
              <strong>Importante:</strong><br />
              A tela do cliente continua sem login.<br />
              O login é somente para a equipe.
            </div>
          </div>
        </div>
      `;

      document.getElementById("btnLogin").onclick = () => {
        const user = (document.getElementById("loginUser").value || "").trim();
        const pass = (document.getElementById("loginPass").value || "").trim();

        if(login(user, pass)){
          renderAdmin();
        }else{
          renderLogin("Usuário ou senha incorretos.");
        }
      };
    }

    function getSummary(){
      const ended = sessions.filter(s => s.status === "ended");
      const total = ended.reduce((acc, item) => acc + getTotalValue(item), 0);
      const extras = ended.reduce((acc, item) => acc + Number(item.extrasCount || 0), 0);

      return {
        totalAtivos: sessions.filter(s => s.status === "active").length,
        totalRecebido: total,
        totalExtras: extras,
        ticketMedio: ended.length ? total / ended.length : 0
      };
    }

    function renderAdmin(){
      currentView = "admin";
      const appEl = document.getElementById("app");
      const summary = getSummary();

      appEl.innerHTML = `
        <div class="wrap">
          <div class="hero">
            <div class="heroTop">
              <div class="brand">
                <h1>🚗 Família Sobre Rodas</h1>
                <p>Painel principal da equipe</p>
              </div>
              <button class="btn-dark" id="btnLogout">Sair</button>
            </div>
            ${renderTabs()}
          </div>

          <div class="${currentTab === "novo" ? "" : "hidden"}">
            <div class="grid grid2">
              <div class="card">
                <h2>🎉 Aba Atendimentos</h2>
                <p class="sub">Etapa 1 pronta: login e separação entre equipe e cliente.</p>
                <p class="sub">
                  Na próxima etapa vamos fazer só o cadastro dos planos funcionar direito,
                  sem mexer no resto.
                </p>
              </div>

              <div class="card">
                <h2>✨ Resumo rápido</h2>
                <div class="statsGrid" style="grid-template-columns:repeat(2,minmax(0,1fr));">
                  <div class="statCard statBlue">
                    <div class="statLabel">Ativos agora</div>
                    <div class="statValue">${summary.totalAtivos}</div>
                  </div>
                  <div class="statCard statGreen">
                    <div class="statLabel">Valor recebido</div>
                    <div class="statValue">${money(summary.totalRecebido)}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="${currentTab === "andamento" ? "" : "hidden"}">
            <div class="card">
              <h2>⏱️ Aba Em andamento</h2>
              <p class="sub">Esta etapa ainda vai ser ajustada depois.</p>
              <div class="empty">Vamos mexer nela depois que a aba Planos estiver 100% certa.</div>
            </div>
          </div>

          <div class="${currentTab === "veiculos" ? "" : "hidden"}">
            <div class="card">
              <h2>🚘 Aba Veículos</h2>
              <p class="sub">Também vamos corrigir depois, em uma etapa separada.</p>
              <div class="empty">Por enquanto estamos organizando a estrutura com login.</div>
            </div>
          </div>

          <div class="${currentTab === "planos" ? "" : "hidden"}">
            <div class="card">
              <h2>💰 Aba Planos / Preços</h2>
              <p class="sub">Próxima etapa: fazer esta aba funcionar 100%.</p>
              <div class="empty">
                Vamos corrigir só o cadastro de planos na próxima versão,
                sem misturar com o resto.
              </div>
            </div>
          </div>

          <div class="${currentTab === "relatorio" ? "" : "hidden"}">
            <div class="card">
              <h2>📊 Aba Relatório</h2>
              <p class="sub">Também vai ser ajustada depois, em outra etapa.</p>
              <div class="empty">Primeiro vamos fechar login + planos.</div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("btnLogout").onclick = logout;

      document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => setTab(btn.dataset.tab);
      });
    }

    function renderClient(){
      currentView = "client";
      const clientId = qs("cliente");
      const item = sessions.find(s => s.id === clientId);

      if(!item){
        renderNotFound();
        return;
      }

      const sec = getSecondsLeft(item);
      const ended = item.status !== "active" || sec <= 0;

      document.getElementById("app").innerHTML = `
        <div class="clientWrap">
          <div class="clientCard">
            <div class="clientTitle">Família Sobre Rodas</div>
            <div class="clientName">${escapeHtml(item.nome || "Cliente")}</div>
            <div class="clientVehicle">🚘 ${escapeHtml(item.veiculo || "Passeio")}</div>

            <div class="clientTimer">${ended ? "00:00" : formatTime(sec)}</div>

            <div class="clientAlert">
              ${ended ? "⛔ TEMPO ENCERRADO" : "⏰ ACOMPANHE SEU TEMPO"}
            </div>

            <div class="clientPrices">
              <div class="clientPriceBox">
                <div class="l">Plano inicial</div>
                <div class="v">${money(item.baseValue)}</div>
              </div>
              <div class="clientPriceBox">
                <div class="l">Extras</div>
                <div class="v">${money(item.extrasValue)}</div>
              </div>
              <div class="clientPriceBox">
                <div class="l">Total atual</div>
                <div class="v">${money(getTotalValue(item))}</div>
              </div>
            </div>

            <div class="clientButtons">
              <button class="btn-pink" disabled>Pedir mais tempo</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderNotFound(){
      document.getElementById("app").innerHTML = `
        <div class="clientWrap">
          <div class="clientCard">
            <h2>Passeio não encontrado</h2>
            <p class="sub">Verifique o link ou QR Code com a equipe.</p>
          </div>
        </div>
      `;
    }

    function updateLiveUI(){
      if(currentView === "client"){
        renderClient();
      }
    }

    function renderApp(){
      if(qs("cliente")){
        renderClient();
        return;
      }

      if(isLoggedIn()){
        renderAdmin();
      }else{
        renderLogin();
      }
    }

    async function init(){
      try{
        onSnapshot(collection(db, "vehicles"), snap => {
          vehicles = snap.docs.map(d => ({ id:d.id, ...d.data() }));
          if(!qs("cliente") && currentView === "admin"){
            renderAdmin();
          }
        });

        onSnapshot(collection(db, "plans"), snap => {
          plans = snap.docs.map(d => ({ id:d.id, ...d.data() }));
          if(!qs("cliente") && currentView === "admin"){
            renderAdmin();
          }
        });

        onSnapshot(collection(db, "sessions"), snap => {
          sessions = snap.docs.map(d => ({ id:d.id, ...d.data() }));
          renderApp();
        });

        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateLiveUI, 1000);
      }catch(err){
        console.error(err);
        document.getElementById("app").innerHTML = `
          <div class="wrap">
            <div class="card">
              <h2>Erro ao carregar</h2>
              <p class="sub">Atualize a página. Se continuar, me avise.</p>
            </div>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
