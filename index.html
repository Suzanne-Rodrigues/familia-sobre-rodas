<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Família Sobre Rodas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root{
      --bg1:#ff8fb1;
      --bg2:#6b7cff;
      --bg3:#8fd3ff;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbeafe;
      --blue:#3366ff;
      --green:#22c55e;
      --orange:#f59e0b;
      --red:#ef4444;
      --purple:#8b5cf6;
      --pink:#ec4899;
      --shadow:0 16px 30px rgba(0,0,0,.16);
      --radius:28px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:18px;
    }

    .hero{
      background:linear-gradient(135deg,#ff9db7,#ff8c7e,#7b7cff);
      color:#fff;
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    .heroTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand h1{
      margin:0;
      font-size:42px;
      line-height:1.05;
    }

    .brand p{
      margin:8px 0 0;
      font-size:18px;
      opacity:.96;
    }

    .tabs{
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .tabBtn{
      border:none;
      border-radius:999px;
      padding:13px 18px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      background:rgba(255,255,255,.16);
      color:#fff;
      transition:.18s ease;
    }

    .tabBtn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .tabBtn.active{
      background:#fff;
      color:#111827;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      border:4px solid rgba(255,255,255,.35);
    }

    .card h2{
      margin:0 0 8px;
      font-size:25px;
    }

    .sub{
      margin:0 0 10px;
      color:var(--muted);
    }

    .hidden{display:none}

    .grid{
      display:grid;
      gap:18px;
    }

    .grid2{
      grid-template-columns:1.05fr .95fr;
    }

    .statsGrid{
      display:grid;
      gap:16px;
      grid-template-columns:repeat(4,minmax(0,1fr));
    }

    .statCard{
      border-radius:24px;
      padding:18px;
      color:#fff;
      box-shadow:var(--shadow);
    }

    .statBlue{background:linear-gradient(135deg,#2563eb,#3b82f6)}
    .statPink{background:linear-gradient(135deg,#db2777,#ec4899)}
    .statGreen{background:linear-gradient(135deg,#16a34a,#22c55e)}
    .statPurple{background:linear-gradient(135deg,#7c3aed,#a78bfa)}

    .statLabel{
      font-size:14px;
      opacity:.94;
    }

    .statValue{
      margin-top:8px;
      font-size:34px;
      font-weight:bold;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:bold;
      color:#374151;
    }

    input, select{
      width:100%;
      padding:15px 16px;
      border-radius:18px;
      border:3px solid var(--line);
      font-size:16px;
      outline:none;
      background:#f8fbff;
      color:#111827;
    }

    input:focus, select:focus{
      border-color:#60a5fa;
      background:#fff;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .row > *{
      flex:1;
      min-width:140px;
    }

    button, .linkBtn{
      border:none;
      border-radius:18px;
      padding:13px 16px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      text-align:center;
      transition:.18s ease;
    }

    button:hover, .linkBtn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .btn-blue{background:var(--blue); color:#fff}
    .btn-green{background:var(--green); color:#fff}
    .btn-yellow{background:var(--orange); color:#fff}
    .btn-red{background:var(--red); color:#fff}
    .btn-purple{background:var(--purple); color:#fff}
    .btn-pink{background:var(--pink); color:#fff}
    .btn-dark{background:#111827; color:#fff}
    .btn-white{background:#fff; color:#111827}

    .sectionActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .listWrap{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:14px;
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:14px;
      border-radius:18px;
      background:linear-gradient(135deg,#eef4ff,#fff2f7);
      border:2px solid #dbeafe;
    }

    .empty{
      color:var(--muted);
      padding:10px 0;
    }

    .session{
      margin-top:16px;
      border-radius:30px;
      padding:20px;
      background:#fff;
      box-shadow:var(--shadow);
      border:4px solid #e5e7eb;
      position:relative;
      overflow:hidden;
    }

    .session.okay{
      background:linear-gradient(135deg,#ffffff,#f0fdf4);
      border-color:#bbf7d0;
    }

    .session.warning{
      background:linear-gradient(135deg,#ffffff,#fff7ed);
      border-color:#fde68a;
    }

    .session.danger{
      background:linear-gradient(135deg,#ffffff,#fff1f2);
      border-color:#fecaca;
      animation:dangerPulse .75s linear infinite;
    }

    .session.requesting{
      border-color:#fff200 !important;
      box-shadow:0 0 0 8px rgba(255,242,0,.24), var(--shadow);
      animation:requestPulse 1s linear infinite;
    }

    @keyframes requestPulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.008)}
    }

    @keyframes dangerPulse{
      0%,100%{filter:brightness(1)}
      50%{filter:brightness(1.09)}
    }

    .sessionTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .sessionName{
      font-size:32px;
      font-weight:bold;
      color:#111827;
    }

    .sessionVehicle{
      margin-top:6px;
      font-size:18px;
      color:#374151;
      font-weight:bold;
    }

    .planBadge{
      display:inline-block;
      margin-top:10px;
      background:#eef2ff;
      color:#111827;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      font-weight:bold;
    }

    .timer{
      font-size:58px;
      font-weight:bold;
      line-height:1;
      text-align:right;
    }

    .alertBanner{
      margin-top:16px;
      border-radius:20px;
      padding:16px;
      font-size:22px;
      font-weight:bold;
      text-align:center;
      box-shadow:0 10px 20px rgba(0,0,0,.12);
    }

    .alertYellow{
      background:#fff200;
      color:#111827;
      animation:alertFlash 0.8s linear infinite;
    }

    .alertRed{
      background:#ef4444;
      color:#fff;
      animation:alertFlash 0.6s linear infinite;
    }

    @keyframes alertFlash{
      0%,100%{filter:brightness(1)}
      50%{filter:brightness(1.18)}
    }

    .moneyGrid{
      margin-top:16px;
      display:grid;
      gap:12px;
      grid-template-columns:repeat(4,minmax(0,1fr));
    }

    .moneyBox{
      background:#f8fafc;
      border:2px solid #dbeafe;
      border-radius:18px;
      padding:14px;
    }

    .moneyLabel{
      font-size:13px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .moneyValue{
      font-size:28px;
      font-weight:bold;
      color:#1d4ed8;
    }

    .sessionButtons{
      margin-top:16px;
      display:grid;
      gap:12px;
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .qrWrap{
      margin-top:16px;
      background:#f8fafc;
      border:2px dashed #cbd5e1;
      border-radius:22px;
      padding:14px;
      display:flex;
      gap:14px;
      align-items:center;
      flex-wrap:wrap;
    }

    .qrBox{
      background:#fff;
      border-radius:16px;
      padding:10px;
      min-width:140px;
      min-height:140px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .qrInfo{
      flex:1;
      min-width:220px;
    }

    .clientWrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(135deg,#fef3c7,#dbeafe,#fce7f3);
    }

    .clientCard{
      width:min(900px,100%);
      background:#fff;
      border-radius:34px;
      padding:24px;
      box-shadow:var(--shadow);
      border:6px solid rgba(255,255,255,.5);
      text-align:center;
      transition:.2s ease;
    }

    .clientCard.warning{
      background:linear-gradient(135deg,#fff7ed,#fef3c7);
    }

    .clientCard.danger{
      background:linear-gradient(135deg,#fee2e2,#fecaca);
      animation:clientPulse .55s linear infinite;
      box-shadow:0 0 0 12px rgba(239,68,68,.18), var(--shadow);
    }

    @keyframes clientPulse{
      0%,100%{transform:scale(1); filter:brightness(1)}
      50%{transform:scale(1.012); filter:brightness(1.22)}
    }

    .clientTitle{
      font-size:20px;
      color:#6b7280;
    }

    .clientName{
      font-size:46px;
      font-weight:bold;
      color:#111827;
      margin-top:8px;
    }

    .clientVehicle{
      font-size:26px;
      margin-top:8px;
      color:#374151;
      font-weight:bold;
    }

    .clientTimer{
      font-size:100px;
      font-weight:bold;
      line-height:1;
      margin:24px 0 16px;
      color:#111827;
    }

    .clientAlert{
      margin-top:12px;
      border-radius:22px;
      padding:18px;
      font-size:30px;
      font-weight:bold;
      box-shadow:0 10px 20px rgba(0,0,0,.14);
    }

    .clientPrices{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(3,minmax(0,1fr));
      margin-top:18px;
    }

    .clientPriceBox{
      background:#f8fafc;
      border:2px solid #dbeafe;
      border-radius:18px;
      padding:14px;
    }

    .clientPriceBox .l{
      font-size:13px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .clientPriceBox .v{
      font-size:28px;
      font-weight:bold;
      color:#1d4ed8;
    }

    .clientButtons{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .smallNote{
      margin-top:14px;
      color:#4b5563;
      font-size:14px;
      font-weight:bold;
    }

    @media (max-width:1100px){
      .grid2{grid-template-columns:1fr}
      .statsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .moneyGrid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width:760px){
      .statsGrid,
      .moneyGrid,
      .clientPrices,
      .sessionButtons{
        grid-template-columns:1fr;
      }
      .hero .brand h1{font-size:30px}
      .sessionName{font-size:26px}
      .timer{text-align:left; font-size:42px}
      .clientName{font-size:34px}
      .clientTimer{font-size:68px}
      .clientAlert{font-size:24px}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      updateDoc,
      deleteDoc,
      doc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5Urxcz07j4Q5Adn-l2CMthjjeydXYuQ",
      authDomain: "familia-sobre-rodas.firebaseapp.com",
      projectId: "familia-sobre-rodas",
      storageBucket: "familia-sobre-rodas.firebasestorage.app",
      messagingSenderId: "36117571121",
      appId: "1:36117571121:web:a3104270db6ce852561710",
      measurementId: "G-R5B8BJ829H"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const defaultVehicles = [
      "Audi",
      "Relâmpago Vermelho",
      "Estrela Azul",
      "Mini Jeep",
      "UTV Aventura"
    ];

    const defaultPlans = [
      { nome:"Passeio Rápido", minutos:5, valor:5 },
      { nome:"Passeio Divertido", minutos:10, valor:10 },
      { nome:"Passeio Completo", minutos:15, valor:15 }
    ];

    const EXTRA_MINUTES = 5;

    let vehicles = [];
    let plans = [];
    let sessions = [];
    let currentTab = "novo";
    let currentView = "admin";
    let seeded = false;
    let timerInterval = null;
    let wakeLock = null;

    let vibrated120 = new Set();
    let vibrated60 = new Set();
    let vibrated0 = new Set();

    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function money(v){
      return Number(v || 0).toLocaleString("pt-BR",{ style:"currency", currency:"BRL" });
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function formatTime(sec){
      const s = Math.max(0, Math.floor(sec));
      const min = Math.floor(s / 60);
      const seg = s % 60;
      return `${min}:${String(seg).padStart(2,"0")}`;
    }

    function getSecondsLeft(item){
      return Math.floor((item.endAt - Date.now()) / 1000);
    }

    function getSessionClass(item){
      const sec = getSecondsLeft(item);
      if(sec <= 60) return "danger";
      if(sec <= 120) return "warning";
      return "okay";
    }

    function getTotalValue(item){
      return Number(item.baseValue || 0) + Number(item.extrasValue || 0);
    }

    function clientLink(id){
      return `${window.location.origin}${window.location.pathname}?cliente=${id}`;
    }

    function vibrate(pattern){
      try{
        if(navigator.vibrate) navigator.vibrate(pattern);
      }catch(e){}
    }

    function beep(times = 1, duration = 220, gap = 120){
      try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if(!AudioCtx) return;
        const ctx = new AudioCtx();
        let startAt = ctx.currentTime;
        for(let i=0;i<times;i++){
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "square";
          osc.frequency.value = i % 2 === 0 ? 880 : 660;
          gain.gain.setValueAtTime(0.001, startAt);
          gain.gain.exponentialRampToValueAtTime(0.15, startAt + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, startAt + duration / 1000);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(startAt);
          osc.stop(startAt + duration / 1000);
          startAt += (duration + gap) / 1000;
        }
      }catch(e){}
    }

    async function requestWakeLock(){
      try{
        if("wakeLock" in navigator && document.visibilityState === "visible"){
          wakeLock = await navigator.wakeLock.request("screen");
        }
      }catch(e){}
    }

    document.addEventListener("visibilitychange", async () => {
      if(currentView === "client" && document.visibilityState === "visible"){
        await requestWakeLock();
      }
    });

    async function seedIfNeeded(){
      if(seeded) return;
      seeded = true;

      const vehicleSnap = await getDocs(collection(db, "vehicles"));
      if(vehicleSnap.empty){
        for(const name of defaultVehicles){
          await addDoc(collection(db, "vehicles"), { name });
        }
      }

      const planSnap = await getDocs(collection(db, "plans"));
      if(planSnap.empty){
        for(const p of defaultPlans){
          await addDoc(collection(db, "plans"), p);
        }
      }
    }

    function setTab(tab){
      currentTab = tab;
      renderAdmin();
    }

    async function addVehicle(){
      const input = document.getElementById("novoVeiculo");
      const name = (input.value || "").trim();
      if(!name){
        alert("Digite o nome do veículo.");
        return;
      }
      await addDoc(collection(db, "vehicles"), { name });
      input.value = "";
    }

    async function removeVehicle(id){
      const inUse = sessions.some(s => s.status === "active" && s.vehicleId === id);
      if(inUse){
        alert("Esse veículo está em uso agora.");
        return;
      }
      if(!confirm("Excluir esse veículo?")) return;
      await deleteDoc(doc(db, "vehicles", id));
    }

    async function addPlan(){
      const nome = (document.getElementById("novoPlanoNome").value || "").trim();
      const minutos = parseInt(document.getElementById("novoPlanoMin").value, 10);
      const valor = parseFloat((document.getElementById("novoPlanoValor").value || "0").replace(",", "."));

      if(!nome){
        alert("Digite o nome do plano.");
        return;
      }
      if(!minutos || minutos <= 0){
        alert("Digite os minutos do plano.");
        return;
      }
      if(!valor || valor <= 0){
        alert("Digite o valor do plano.");
        return;
      }

      await addDoc(collection(db, "plans"), { nome, minutos, valor });
      document.getElementById("novoPlanoNome").value = "";
      document.getElementById("novoPlanoMin").value = "";
      document.getElementById("novoPlanoValor").value = "";
    }

    async function removePlan(id){
      const inUse = sessions.some(s => s.status === "active" && s.planId === id);
      if(inUse){
        alert("Esse plano está em uso agora.");
        return;
      }
      if(!confirm("Excluir esse plano?")) return;
      await deleteDoc(doc(db, "plans", id));
    }

    async function startSession(){
      const nome = (document.getElementById("nomeCrianca").value || "").trim();
      const vehicleId = document.getElementById("veiculoEscolhido").value;
      const planId = document.getElementById("planoEscolhido").value;

      if(!nome){
        alert("Digite o nome da criança.");
        return;
      }

      const vehicle = vehicles.find(v => v.id === vehicleId);
      if(!vehicle){
        alert("Selecione o veículo.");
        return;
      }

      const plan = plans.find(p => p.id === planId);
      if(!plan){
        alert("Selecione o plano.");
        return;
      }

      const now = Date.now();

      await addDoc(collection(db, "sessions"), {
        nome,
        vehicleId,
        veiculo: vehicle.name,
        planId,
        planName: plan.nome,
        baseMinutes: Number(plan.minutos),
        baseValue: Number(plan.valor),
        extrasCount: 0,
        extrasValue: 0,
        startAt: now,
        endAt: now + Number(plan.minutos) * 60 * 1000,
        status: "active",
        requestMore: false,
        requestAt: null,
        createdAt: now,
        endedAt: null
      });

      document.getElementById("nomeCrianca").value = "";
      document.getElementById("veiculoEscolhido").value = "";
      document.getElementById("planoEscolhido").value = "";
      currentTab = "andamento";
      renderAdmin();
    }

    async function requestMore(id){
      const item = sessions.find(s => s.id === id);
      if(!item || item.status !== "active") return;

      await updateDoc(doc(db, "sessions", id), {
        requestMore: true,
        requestAt: Date.now()
      });
    }

    async function approveMore(id){
      const item = sessions.find(s => s.id === id);
      if(!item) return;

      const extraValue = Number(item.baseValue || 0);
      const base = item.endAt > Date.now() ? item.endAt : Date.now();

      await updateDoc(doc(db, "sessions", id), {
        endAt: base + EXTRA_MINUTES * 60 * 1000,
        extrasCount: Number(item.extrasCount || 0) + 1,
        extrasValue: Number(item.extrasValue || 0) + extraValue,
        requestMore: false,
        requestAt: null
      });
    }

    async function endSession(id){
      if(!confirm("Encerrar atendimento?")) return;
      await updateDoc(doc(db, "sessions", id), {
        status: "ended",
        requestMore: false,
        requestAt: null,
        endedAt: Date.now()
      });
    }

    function getActiveSorted(){
      return sessions
        .filter(s => s.status === "active")
        .sort((a,b) => {
          if(Boolean(a.requestMore) !== Boolean(b.requestMore)){
            return a.requestMore ? -1 : 1;
          }
          return getSecondsLeft(a) - getSecondsLeft(b);
        });
    }

    function getEndedSorted(){
      return sessions
        .filter(s => s.status === "ended")
        .sort((a,b) => Number(b.endedAt || 0) - Number(a.endedAt || 0));
    }

    function getSummary(){
      const ended = getEndedSorted();
      const total = ended.reduce((acc, item) => acc + getTotalValue(item), 0);
      const extras = ended.reduce((acc, item) => acc + Number(item.extrasCount || 0), 0);

      const vehicleUse = {};
      ended.forEach(item => {
        vehicleUse[item.veiculo] = (vehicleUse[item.veiculo] || 0) + 1;
      });

      let topVehicle = "-";
      let topCount = 0;
      Object.entries(vehicleUse).forEach(([name,count]) => {
        if(count > topCount){
          topCount = count;
          topVehicle = name;
        }
      });

      return {
        totalAtivos: getActiveSorted().length,
        totalRecebido: total,
        totalExtras: extras,
        ticketMedio: ended.length ? total / ended.length : 0,
        topVehicle
      };
    }

    function renderTabs(){
