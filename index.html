<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Família Sobre Rodas</title>
  <style>
    :root{
      --bg1:#6a11cb;
      --bg2:#2575fc;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --green:#22c55e;
      --yellow:#f59e0b;
      --red:#ef4444;
      --blue:#3b82f6;
      --pink:#ec4899;
      --purple:#8b5cf6;
      --cyan:#06b6d4;
      --line:#e5e7eb;
      --shadow:0 12px 25px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }

    .wrap{
      max-width:1150px;
      margin:0 auto;
      padding:18px;
    }

    .hero{
      background: linear-gradient(135deg, #ff7eb3, #ff758c, #ffb347);
      color:white;
      border-radius:24px;
      padding:22px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .hero h1{
      margin:0;
      font-size:36px;
    }

    .hero p{
      margin:8px 0 0;
      font-size:18px;
      opacity:.95;
    }

    .grid{
      display:grid;
      gap:18px;
    }

    .grid2{
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    }

    .card{
      background:var(--card);
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow);
      border:4px solid rgba(255,255,255,.25);
    }

    .card h2{
      margin:0 0 10px;
      font-size:22px;
      color:#111827;
    }

    .sub{
      color:var(--muted);
      margin:0 0 10px;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:bold;
      color:#374151;
    }

    input, select{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:3px solid #dbeafe;
      font-size:16px;
      outline:none;
      background:#f8fbff;
      color:#111827;
      pointer-events:auto;
    }

    input:focus, select:focus{
      border-color:#60a5fa;
      background:#ffffff;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .row > *{
      flex:1;
      min-width:120px;
    }

    button, .linkBtn{
      border:none;
      border-radius:16px;
      padding:12px 16px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      text-align:center;
      transition:transform .12s ease;
    }

    button:hover, .linkBtn:hover{
      transform:scale(1.02);
    }

    .btn-green{ background:var(--green); color:white; }
    .btn-blue{ background:var(--blue); color:white; }
    .btn-yellow{ background:var(--yellow); color:white; }
    .btn-red{ background:var(--red); color:white; }
    .btn-pink{ background:var(--pink); color:white; }
    .btn-purple{ background:var(--purple); color:white; }
    .btn-dark{ background:#111827; color:white; }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .vehicleList{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:14px;
    }

    .vehicleItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:linear-gradient(135deg, #eff6ff, #fdf2f8);
      border:2px solid #dbeafe;
      border-radius:18px;
      padding:12px;
    }

    .sessionsWrap{
      margin-top:18px;
    }

    .session{
      border-radius:24px;
      padding:18px;
      margin-top:14px;
      color:white;
      box-shadow:var(--shadow);
    }

    .session.green{
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .session.yellow{
      background: linear-gradient(135deg, #f59e0b, #f97316);
    }

    .session.red{
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .flash{
      animation:piscar 1s linear infinite;
    }

    @keyframes piscar{
      0%,50%,100% { filter:brightness(1); }
      25%,75% { filter:brightness(1.15); }
    }

    .sessionTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      flex-wrap:wrap;
    }

    .name{
      font-size:28px;
      font-weight:bold;
    }

    .vehicle{
      margin-top:6px;
      font-size:18px;
    }

    .timer{
      font-size:48px;
      font-weight:bold;
      margin-top:16px;
    }

    .badge{
      display:inline-block;
      margin-top:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.2);
      font-size:13px;
      font-weight:bold;
    }

    .small{
      margin-top:8px;
      font-size:13px;
      opacity:.95;
    }

    .clientWrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .clientCard{
      width:min(760px,100%);
      background:white;
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
      border:5px solid rgba(255,255,255,.4);
    }

    .clientTitle{
      font-size:18px;
      color:#6b7280;
    }

    .clientName{
      font-size:38px;
      font-weight:bold;
      margin-top:10px;
      color:#111827;
    }

    .clientVehicle{
      font-size:22px;
      margin-top:8px;
      color:#374151;
    }

    .clientTimer{
      font-size:76px;
      font-weight:bold;
      margin:24px 0;
      color:#111827;
    }

    .notice{
      font-size:20px;
      font-weight:bold;
      margin-top:10px;
    }

    .clientGreen{
      background:linear-gradient(135deg, #d1fae5, #a7f3d0);
    }

    .clientYellow{
      background:linear-gradient(135deg, #fef3c7, #fdba74);
    }

    .clientRed{
      background:linear-gradient(135deg, #fee2e2, #fca5a5);
    }

    .empty{
      color:#6b7280;
      padding:8px 0;
    }

    @media (max-width:640px){
      .hero h1{ font-size:28px; }
      .name{ font-size:22px; }
      .timer{ font-size:36px; }
      .clientName{ font-size:30px; }
      .clientTimer{ font-size:56px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      updateDoc,
      deleteDoc,
      doc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5Urxcz07j4Q5Adn-l2CMthjjeydXYuQ",
      authDomain: "familia-sobre-rodas.firebaseapp.com",
      projectId: "familia-sobre-rodas",
      storageBucket: "familia-sobre-rodas.firebasestorage.app",
      messagingSenderId: "36117571121",
      appId: "1:36117571121:web:a3104270db6ce852561710",
      measurementId: "G-R5B8BJ829H"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const defaultVehicles = [
      "Moto Edge Titan",
      "Quadriciclo Vermelho",
      "Jipe Titan",
      "Audi",
      "Jipe UTV"
    ];

    let vehicles = [];
    let sessions = [];
    let ticking = null;
    let seeded = false;

    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function formatTime(sec){
      const s = Math.max(0, Math.floor(sec));
      const min = Math.floor(s / 60);
      const seg = s % 60;
      return `${min}:${String(seg).padStart(2, "0")}`;
    }

    function colorClass(secondsLeft){
      if(secondsLeft <= 0) return "red";
      if(secondsLeft <= 120) return "yellow";
      return "green";
    }

    function clientColor(secondsLeft){
      if(secondsLeft <= 0) return "clientRed";
      if(secondsLeft <= 120) return "clientYellow";
      return "clientGreen";
    }

    function vibrate(pattern){
      if(navigator.vibrate){
        navigator.vibrate(pattern);
      }
    }

    function clientLink(id){
      return `${window.location.origin}${window.location.pathname}?cliente=${id}`;
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function seedVehiclesIfNeeded(){
      if(seeded) return;
      seeded = true;
      const snap = await getDocs(collection(db, "vehicles"));
      if(snap.empty){
        for(const name of defaultVehicles){
          await addDoc(collection(db, "vehicles"), { name });
        }
      }
    }

    async function addVehicle(){
      const input = document.getElementById("novoVeiculo");
      if(!input) return;
      const name = (input.value || "").trim();
      if(!name){
        alert("Digite o nome do veículo.");
        return;
      }
      await addDoc(collection(db, "vehicles"), { name });
      input.value = "";
    }

    async function removeVehicle(id){
      const activeUsing = sessions.some(s => s.status === "active" && s.vehicleId === id);
      if(activeUsing){
        alert("Esse veículo está em uso agora.");
        return;
      }
      if(!confirm("Excluir este veículo?")) return;
      await deleteDoc(doc(db, "vehicles", id));
    }

    async function startSession(){
      const nomeInput = document.getElementById("nome");
      const veiculoSelect = document.getElementById("veiculo");
      const tempoSelect = document.getElementById("tempo");

      if(!nomeInput || !veiculoSelect || !tempoSelect){
        alert("Tela ainda carregando. Tente novamente.");
        return;
      }

      const nome = (nomeInput.value || "").trim();
      const vehicleId = veiculoSelect.value;
      const tempo = parseInt(tempoSelect.value, 10);

      if(!nome){
        alert("Digite o nome da criança.");
        nomeInput.focus();
        return;
      }

      const vehicle = vehicles.find(v => v.id === vehicleId);
      if(!vehicle){
        alert("Selecione um veículo.");
        return;
      }

      const now = Date.now();
      const endAt = now + tempo * 60 * 1000;

      await addDoc(collection(db, "sessions"), {
        nome,
        vehicleId,
        veiculo: vehicle.name,
        minutesBought: tempo,
        startAt: now,
        endAt,
        status: "active",
        requestMore: false,
        requestAt: null,
        createdAt: now
      });

      nomeInput.value = "";
    }

    async function approveMore(id){
      const item = sessions.find(s => s.id === id);
      if(!item) return;
      const base = item.endAt > Date.now() ? item.endAt : Date.now();
      await updateDoc(doc(db, "sessions", id), {
        endAt: base + 5 * 60 * 1000,
        requestMore: false,
        requestAt: null
      });
    }

    async function requestMore(id){
      await updateDoc(doc(db, "sessions", id), {
        requestMore: true,
        requestAt: Date.now()
      });
    }

    async function endSession(id){
      if(!confirm("Encerrar atendimento?")) return;
      await updateDoc(doc(db, "sessions", id), {
        status: "ended",
        requestMore: false
      });
    }

    async function reopenSession(id){
      const base = Date.now();
      await updateDoc(doc(db, "sessions", id), {
        status: "active",
        endAt: base + 5 * 60 * 1000,
        requestMore: false,
        requestAt: null
      });
    }

    function renderAttendant(){
      const appEl = document.getElementById("app");

      const active = sessions
        .filter(s => s.status === "active")
        .sort((a,b) => a.createdAt - b.createdAt);

      const ended = sessions
        .filter(s => s.status === "ended")
        .sort((a,b) => b.createdAt - a.createdAt)
        .slice(0, 10);

      appEl.innerHTML = `
        <div class="wrap">
          <div class="hero">
            <h1>🚗 Família Sobre Rodas</h1>
            <p>Painel do atendente</p>
          </div>

          <div class="grid grid2">
            <div class="card">
              <h2>🎉 Novo atendimento</h2>
              <p class="sub">Preencha rapidinho e inicie o tempo.</p>

              <label>Nome da criança</label>
              <input id="nome" placeholder="Ex.: Miguel" />

              <label>Veículo</label>
              <select id="veiculo">
                <option value="">Selecione um veículo</option>
                ${vehicles.map(v => `<option value="${v.id}">${escapeHtml(v.name)}</option>`).join("")}
              </select>

              <label>Tempo</label>
              <select id="tempo">
                <option value="5">5 min</option>
                <option value="10">10 min</option>
                <option value="15">15 min</option>
                <option value="20">20 min</option>
                <option value="25">25 min</option>
                <option value="30">30 min</option>
                <option value="35">35 min</option>
                <option value="40">40 min</option>
                <option value="45">45 min</option>
                <option value="50">50 min</option>
                <option value="55">55 min</option>
                <option value="60">60 min</option>
              </select>

              <div class="actions">
                <button class="btn-green" id="btnIniciar">Iniciar atendimento</button>
              </div>
            </div>

            <div class="card">
              <h2>🌈 Veículos</h2>
              <p class="sub">Adicione novos veículos quando comprar mais.</p>

              <label>Novo veículo</label>
              <div class="row">
                <input id="novoVeiculo" placeholder="Ex.: Mini Fusca Azul" />
                <button class="btn-blue" id="btnAddVeiculo">Adicionar</button>
              </div>

              <div class="vehicleList">
                ${vehicles.length === 0 ? `<div class="empty">Nenhum veículo cadastrado.</div>` : ""}
                ${vehicles.map(v => `
                  <div class="vehicleItem">
                    <div><strong>${escapeHtml(v.name)}</strong></div>
                    <button class="btn-red" data-remove-vehicle="${v.id}">Excluir</button>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>

          <div class="card sessionsWrap">
            <h2>⏱️ Atendimentos ativos</h2>
            <p class="sub">O cliente pode acompanhar pelo próprio celular.</p>

            ${active.length === 0 ? `<div class="empty">Nenhum atendimento ativo agora.</div>` : ""}

            ${active.map(item => {
              const left = Math.floor((item.endAt - Date.now()) / 1000);
              const color = colorClass(left);
              const flash = left <= 60 ? "flash" : "";
              return `
                <div class="session ${color} ${flash}">
                  <div class="sessionTop">
                    <div>
                      <div class="name">${escapeHtml(item.nome)}</div>
                      <div class="vehicle">🚘 ${escapeHtml(item.veiculo)}</div>
                      <div class="badge">Link do cliente</div>
                    </div>
                    <div>
                      ${item.requestMore ? `<div class="badge">⚠️ Pediu +5 min</div>` : ""}
                    </div>
                  </div>

                  <div class="timer">${left > 0 ? "⏳ " + formatTime(left) : "⛔ 00:00"}</div>
                  <div class="small">Tempo comprado: ${item.minutesBought} min</div>

                  <div class="actions">
                    <a class="linkBtn btn-purple" href="${clientLink(item.id)}" target="_blank">Tela do cliente</a>
                    <button class="btn-blue" data-copy="${item.id}">Copiar link</button>
                    <button class="btn-yellow" data-approve="${item.id}">Liberar +5 min</button>
                    <button class="btn-red" data-end="${item.id}">Encerrar</button>
                  </div>
                </div>
              `;
            }).join("")}
          </div>

          <div class="card sessionsWrap">
            <h2>🧾 Últimos encerrados</h2>
            ${ended.length === 0 ? `<div class="empty">Nenhum atendimento encerrado ainda.</div>` : ""}
            ${ended.map(item => `
              <div class="vehicleItem">
                <div>
                  <strong>${escapeHtml(item.nome)}</strong> - ${escapeHtml(item.veiculo)}
                </div>
                <button class="btn-dark" data-reopen="${item.id}">Reabrir +5 min</button>
              </div>
            `).join("")}
          </div>
        </div>
      `;

      const btnIniciar = document.getElementById("btnIniciar");
      const btnAddVeiculo = document.getElementById("btnAddVeiculo");

      if(btnIniciar) btnIniciar.onclick = startSession;
      if(btnAddVeiculo) btnAddVeiculo.onclick = addVehicle;

      document.querySelectorAll("[data-remove-vehicle]").forEach(btn => {
        btn.onclick = () => removeVehicle(btn.dataset.removeVehicle);
      });

      document.querySelectorAll("[data-approve]").forEach(btn => {
        btn.onclick = () => approveMore(btn.dataset.approve);
      });

      document.querySelectorAll("[data-end]").forEach(btn => {
        btn.onclick = () => endSession(btn.dataset.end);
      });

      document.querySelectorAll("[data-reopen]").forEach(btn => {
        btn.onclick = () => reopenSession(btn.dataset.reopen);
      });

      document.querySelectorAll("[data-copy]").forEach(btn => {
        btn.onclick = async () => {
          const link = clientLink(btn.dataset.copy);
          try{
            await navigator.clipboard.writeText(link);
            alert("Link copiado.");
          }catch{
            alert(link);
          }
        };
      });
    }

    function renderClient(session){
      const left = Math.floor((session.endAt - Date.now()) / 1000);
      const ended = session.status !== "active" || left <= 0;
      const appEl = document.getElementById("app");

      appEl.innerHTML = `
        <div class="clientWrap">
          <div class="clientCard ${clientColor(left)} ${left <= 60 ? "flash" : ""}">
            <div class="clientTitle">Família Sobre Rodas</div>
            <div class="clientName">${escapeHtml(session.nome)}</div>
            <div class="clientVehicle">🚘 ${escapeHtml(session.veiculo)}</div>
            <div class="clientTimer">${ended ? "00:00" : formatTime(left)}</div>

            <div class="notice">
              ${ended ? "⛔ Tempo encerrado" : left <= 60 ? "⚠️ Está acabando" : left <= 120 ? "⌛ Faltam 2 minutos" : "🎉 Tempo em andamento"}
            </div>

            <div class="actions" style="justify-content:center; margin-top:18px;">
              <button class="btn-pink" id="btnPedirMais" ${ended ? "disabled" : ""}>Pedir +5 min</button>
            </div>

            <p class="sub" style="margin-top:14px;">
              ${session.requestMore ? "Pedido enviado. Aguarde a liberação do atendente." : "Se quiser mais tempo, clique no botão acima."}
            </p>
          </div>
        </div>
      `;

      const btn = document.getElementById("btnPedirMais");
      if(btn){
        btn.onclick = () => requestMore(session.id);
      }

      if(left === 120) vibrate([200,100,200]);
      if(left === 60) vibrate([300,100,300,100,300]);
      if(left === 0) vibrate([500,150,500]);
    }

    function renderNotFound(){
      document.getElementById("app").innerHTML = `
        <div class="clientWrap">
          <div class="clientCard">
            <h2>Atendimento não encontrado</h2>
          </div>
        </div>
      `;
    }

    async function init(){
      try{
        await seedVehiclesIfNeeded();

        onSnapshot(collection(db, "vehicles"), snap => {
          vehicles = snap.docs
            .map(d => ({ id:d.id, ...d.data() }))
            .sort((a,b) => a.name.localeCompare(b.name));

          if(!qs("cliente")){
            renderAttendant();
          }
        });

        onSnapshot(collection(db, "sessions"), snap => {
          sessions = snap.docs.map(d => ({ id:d.id, ...d.data() }));

          const clientId = qs("cliente");
          if(clientId){
            const session = sessions.find(s => s.id === clientId);
            if(session) renderClient(session);
            else renderNotFound();
          }else{
            renderAttendant();
          }
        });

        if(ticking) clearInterval(ticking);
        ticking = setInterval(() => {
          const clientId = qs("cliente");
          if(clientId){
            const session = sessions.find(s => s.id === clientId);
            if(session) renderClient(session);
          }else{
            renderAttendant();
          }
        }, 1000);

      }catch(err){
        console.error(err);
        document.getElementById("app").innerHTML = `
          <div class="wrap">
            <div class="card">
              <h2>Erro ao carregar</h2>
              <p class="sub">Atualize a página. Se continuar, me avise.</p>
            </div>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
